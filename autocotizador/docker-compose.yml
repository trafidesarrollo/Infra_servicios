services:
  app:
    image: ghcr.io/${GITHUB_USERNAME}/cotizador:latest
    container_name: autocotizador-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "${APP_PORT:-5000}:5000"
    networks:
      - infra_shared

networks:
  infra_shared:
    name: infra_shared
    external: true
