services:
  app:
    image: ghcr.io/${GITHUB_USERNAME}/stock-intermedio:latest
    container_name: brica-stockintermedio-app
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - infra_shared

networks:
  infra_shared:
    name: infra_shared
    external: true

volumes:
  uploads_data:
